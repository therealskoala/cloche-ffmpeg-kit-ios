# Builds FFmpeg-Kit for iOS from the archived official source — LGPL "full"
# variant (all non-GPL external libraries; freetype/fontconfig included for
# drawtext). GPL libraries (x264, x265, xvid, vid.stab, rubberband) are
# excluded BY DESIGN: ios.sh refuses them without --enable-gpl, which this
# workflow never passes. The Cloche app encodes H.264 with Apple's hardware
# encoder (h264_videotoolbox), so libx264 is not needed.
#
# Output: a GitHub Release holding ffmpeg-kit-full-6.0-ios-xcframework.zip
# (+ SHA256SUMS.txt). The app's podspec vendors frameworks from that zip.
#
# Source custody: checks out ffmpeg-kit v6.0 from THIS repo owner's fork
# (fork arthenica/ffmpeg-kit before dispatching). Public repo = free macOS
# runners, and public hosting of LGPL binaries next to their source satisfies
# the LGPL source-availability terms.

name: build-ffmpeg-kit-ios-full-lgpl

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "ffmpeg-kit source repo (owner/name)"
        required: false
        default: ""
      source_ref:
        description: "ffmpeg-kit tag/branch to build"
        required: false
        default: "v6.0"

permissions:
  contents: write

jobs:
  build:
    # Xcode 15.x era image — closest to what FFmpeg-Kit 6.0 (Aug 2023) was
    # built with. If GitHub retires macos-14, try macos-15 and pin the oldest
    # Xcode on it via xcode-select.
    runs-on: macos-14
    timeout-minutes: 350
    steps:
      - name: Checkout ffmpeg-kit source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo != '' && inputs.source_repo || format('{0}/ffmpeg-kit', github.repository_owner) }}
          ref: ${{ inputs.source_ref }}

      - name: Install build prerequisites
        run: brew install autoconf automake libtool pkg-config

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Build iOS xcframeworks (full, LGPL — no --enable-gpl)
        run: ./ios.sh --xcframework --full

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          if-no-files-found: ignore

      - name: Package
        run: |
          cd prebuilt/bundle-apple-xcframework-ios
          zip -r -y ../../ffmpeg-kit-full-6.0-ios-xcframework.zip .
          cd ../..
          shasum -a 256 ffmpeg-kit-full-6.0-ios-xcframework.zip | tee SHA256SUMS.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v6.0-full-lgpl-$(date -u +%Y%m%d)"
          gh release create "$TAG" \
            ffmpeg-kit-full-6.0-ios-xcframework.zip SHA256SUMS.txt \
            --repo "${{ github.repository }}" \
            --title "FFmpeg-Kit iOS 6.0 full (LGPL)" \
            --notes "Built unmodified from ffmpeg-kit ${{ inputs.source_ref }} with \`./ios.sh --xcframework --full\` (no GPL libraries). Source: the ffmpeg-kit fork under this account. Licenses: LGPL v3.0 and the individual external-library licenses bundled inside each framework."
