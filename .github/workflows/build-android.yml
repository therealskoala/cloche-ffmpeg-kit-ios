# Builds the Android FFmpeg-Kit AAR from the archived official source so the
# app's PRIVATE TEST builds stop depending on a community-mirrored binary
# (same bits, but now built and hosted under this account — auditably).
#
# ⚠ This artifact is full-gpl (libx264 for H.264 encode on Android, where
# FFmpeg 6.0 has no hardware encoder). GPL means: PRIVATE TEST BUILDS ONLY —
# never distribute an app containing it. The shipping platform is iOS, which
# uses the separate LGPL build (build.yml) + Apple's videotoolbox.

name: build-ffmpeg-kit-android-full-gpl-test

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "ffmpeg-kit source repo (owner/name)"
        required: false
        default: ""
      source_ref:
        description: "ffmpeg-kit tag/branch to build"
        required: false
        default: "v6.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout ffmpeg-kit source
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo != '' && inputs.source_repo || format('{0}/ffmpeg-kit', github.repository_owner) }}
          ref: ${{ inputs.source_ref }}

      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config nasm meson ninja-build gperf autogen gettext autopoint groff texinfo

      - name: Pin NDK 25 (era-matched to ffmpeg-kit 6.0)
        run: |
          echo "y" | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          echo "SDK: $ANDROID_SDK_ROOT"
          echo "NDK: $ANDROID_NDK_ROOT"
          java -version

      # Same external-library set as the iOS LGPL build, plus x264 (GPL) for
      # the Android software H.264 encoder. arm-v7a and x86 are skipped: test
      # devices are arm64, desktop emulators are x86_64.
      - name: Build Android AAR (full-gpl, test-only)
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          ./android.sh \
            --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 \
            --enable-gpl --enable-x264 \
            --enable-android-zlib --enable-android-media-codec \
            --enable-fontconfig --enable-freetype --enable-fribidi \
            --enable-kvazaar --enable-lame --enable-libass \
            --enable-libilbc --enable-libtheora --enable-libvorbis --enable-libvpx \
            --enable-libwebp --enable-libxml2 --enable-opencore-amr --enable-opus \
            --enable-shine --enable-snappy --enable-soxr --enable-speex \
            --enable-twolame --enable-vo-amrwbenc --enable-zimg --enable-dav1d

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: build.log
          if-no-files-found: ignore

      - name: Package
        run: |
          cp prebuilt/bundle-android-aar/ffmpeg-kit/ffmpeg-kit.aar ffmpeg-kit-full-gpl-test.aar
          sha256sum ffmpeg-kit-full-gpl-test.aar | tee SHA256SUMS-android.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          # Dispatch input reaches the shell only through env — never
          # interpolated into the script text (expression injection guard).
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          TAG="v6.0-android-full-gpl-test"
          NOTES="PRIVATE TEST BUILDS ONLY — full-gpl (contains libx264, GPL). Do not distribute. Built unmodified from ffmpeg-kit ${SOURCE_REF} (official archived source; fork under this account); arm64-v8a + x86_64. Exact flags: see .github/workflows/build-android.yml."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" ffmpeg-kit-full-gpl-test.aar SHA256SUMS-android.txt --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" \
              ffmpeg-kit-full-gpl-test.aar SHA256SUMS-android.txt \
              --repo "$GITHUB_REPOSITORY" \
              --title "FFmpeg-Kit Android 6.0 full-gpl (test only)" \
              --notes "$NOTES"
          fi
